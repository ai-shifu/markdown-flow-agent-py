name: Lint

# Runs the same checks as the local lefthook hooks, on every PR into main.
# Replaces the pre-commit.ci hosted check. Tool versions are pinned to match
# what the project previously ran, so CI behaviour stays identical.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lefthook
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install "ruff==0.13.1" "mypy==1.18.2" "commitizen==4.9.1" "typing_extensions"
          npm install -g "markdownlint-cli@0.45.0" "lefthook"

      - name: Run checks
        run: lefthook run pre-commit --all-files --force
